version: '3.8'

services:
  # Flask Application
  api:
    build: ./backend
    container_name: agro_flask_api
    restart: always
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - db
      - redis
    volumes:
      - ./backend/logs:/app/logs
      - ./backend/uploads:/app/uploads

  # Redis for Caching
  redis:
    image: redis:alpine
    container_name: agro_redis
    restart: always
    ports:
      - "6379:6379"

  # Prometheus for MLOps Monitoring
  prometheus:
    image: prom/prometheus
    container_name: agro_prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: agro_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./backend/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./backend/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api

  # Database
  db:
    image: postgres:15-alpine
    container_name: agro_db
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
