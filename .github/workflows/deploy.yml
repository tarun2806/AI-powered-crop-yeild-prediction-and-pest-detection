name: Deploy AgroSaaS to AWS

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1

      - name: Build and Push Docker Image
        run: |
          docker build -t 1234567890.dkr.ecr.us-east-1.amazonaws.com/agro-api:latest ./flask_api
          docker push 1234567890.dkr.ecr.us-east-1.amazonaws.com/agro-api:latest

      - name: SSH Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker pull 1234567890.dkr.ecr.us-east-1.amazonaws.com/agro-api:latest
            docker-compose up -d --remove-orphans
