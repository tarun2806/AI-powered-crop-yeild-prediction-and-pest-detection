services:
  - type: web
    name: agro-flask-api
    runtime: python
    buildCommand: "cd backend && pip install -r requirements.txt && flask db upgrade"
    startCommand: "cd backend && gunicorn run:app --workers=1 --threads=2 --timeout=120 -b 0.0.0.0:$PORT"
    envVars:
      - key: FLASK_APP
        value: run.py
      - key: RENDER
        value: '1'
      - key: DATABASE_URL
        fromDatabase:
          name: agro-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
    plan: free

databases:
  - name: agro-db
    databaseName: agrosaas
    user: agroadmin
    plan: free
